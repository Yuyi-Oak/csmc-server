# CSMC 配置（中文）
# 设置 UI 语言标签。
general:
  language: zh-CN
  debug: false

# 存储后端配置。
storage:
  # YAML, SQLITE, MYSQL, POSTGRESQL, MONGODB, REDIS
  type: YAML
  yaml:
    path: data/players.yml
  sqlite:
    file: data/csmc.sqlite
  mysql:
    host: localhost
    port: 3306
    database: csmc
    username: root
    password: password
    pool:
      maxSize: 10
  postgresql:
    host: localhost
    port: 5432
    database: csmc
    username: postgres
    password: password
    pool:
      maxSize: 10
  mongodb:
    uri: mongodb://localhost:27017
    database: csmc
  redis:
    uri: redis://localhost:6379
    namespace: csmc

# 服务器/对局限制。
server:
  maxSessions: 2
  maxPlayersPerSession: 40

# 游戏默认值。
game:
  # COMPETITIVE, CASUAL, DEATHMATCH, TEAM_DEATHMATCH, ARMS_RACE, DEMOLITION, WINGMAN, DANGER_ZONE
  defaultMode: COMPETITIVE
