name: CSMC
main: top.scfd.mcplugins.csmc.CSMCPlugin
version: ${version}
api-version: ${apiVersion}
author: scfd
website: https://example.invalid
load: POSTWORLD
commands:
  csmc:
    description: CSMC session command
    usage: /csmc create <mode> [mapId] | /csmc maps | /csmc join <id> | /csmc leave | /csmc start | /csmc buy <item> | /csmc view <free|player> | /csmc stats [player] | /csmc top | /csmc queue <join|leave|status> [mode]
  csmcmap:
    description: CSMC map editor command
    usage: /csmcmap list | /csmcmap create <id> [name] | /csmcmap info <id> | /csmcmap save <id>
