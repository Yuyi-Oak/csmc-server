name: CSMC
main: top.scfd.mcplugins.csmc.CSMCPlugin
version: ${version}
api-version: ${apiVersion}
author: scfd
website: https://example.invalid
load: POSTWORLD
commands:
  csmc:
    description: CSMC session command
    usage: /csmc create <mode> [mapId] | /csmc maps | /csmc join <id> | /csmc leave | /csmc start | /csmc buy <item> | /csmc view <free|player> | /csmc stats [player] | /csmc top | /csmc queue <join|leave|status> [mode] [mapId]
  csmcmap:
    description: CSMC map editor command
    usage: /csmcmap list | /csmcmap info <id> | /csmcmap listpoints <id> | /csmcmap addspawn/removespawn | /csmcmap addbuy/removebuy | /csmcmap save <id>
permissions:
  csmc.anticheat.alert:
    description: Receive CSMC anti-cheat alerts.
    default: op
